extends:
  - spectral:oas

rules:

  api-path-lowercase:
    description: API Path must be lowercase.
    severity: error
    given: $.paths.*
    then:
      function: pattern
      functionOptions:
        match: "^[a-z0-9/{}_-]+$"

  api-version-required:
    description: Path must start with /api/v1 or /api/v2
    severity: error
    given: $.paths
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          propertyNames:
            pattern: "^/api/v[0-9]+/"

  operation-summary:
    description: summary is required
    severity: warn
    given: $.paths[*][*]
    then:
      field: summary
      function: truthy

  operation-description:
    description: description is required
    severity: warn
    given: $.paths[*][*]
    then:
      field: description
      function: truthy
